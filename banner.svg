<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640" width="1280" height="640">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f0720"/>
      <stop offset="50%" stop-color="#1a0a30"/>
      <stop offset="100%" stop-color="#0a0f20"/>
    </linearGradient>
    <linearGradient id="glow1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7c3aed" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#2563eb" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="glow2" x1="100%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#f59e0b" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#ef4444" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
    <linearGradient id="g2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#ef4444"/>
    </linearGradient>
    <linearGradient id="tailg" x1="100%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#7c3aed" stop-opacity="0"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0.5"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1280" height="640" fill="url(#bg)"/>

  <!-- Gradient overlays for depth -->
  <rect width="1280" height="640" fill="url(#glow1)"/>
  <rect width="1280" height="640" fill="url(#glow2)"/>

  <!-- Grid pattern -->
  <g stroke="#7c3aed" stroke-width="0.3" opacity="0.06">
    <line x1="0" y1="160" x2="1280" y2="160"/>
    <line x1="0" y1="320" x2="1280" y2="320"/>
    <line x1="0" y1="480" x2="1280" y2="480"/>
    <line x1="320" y1="0" x2="320" y2="640"/>
    <line x1="640" y1="0" x2="640" y2="640"/>
    <line x1="960" y1="0" x2="960" y2="640"/>
  </g>

  <!-- Decorative orbit -->
  <circle cx="640" cy="320" r="240" fill="none" stroke="#7c3aed" stroke-width="0.5" opacity="0.1"/>
  <circle cx="640" cy="320" r="180" fill="none" stroke="#7c3aed" stroke-width="0.3" opacity="0.08"/>

  <!-- Logo / Shooting star -->
  <g transform="translate(340, 220) scale(1.4)">
    <!-- Tail -->
    <path d="M-80 80 Q-30 50 18 22"
          stroke="url(#tailg)" stroke-width="3" stroke-linecap="round" fill="none"/>
    <!-- Diamond star -->
    <path d="M18 22 L28 4 L18 -14 L8 4 Z" fill="url(#g1)" filter="url(#glow)"/>
    <path d="M18 22 L18 -14 L8 4 Z" fill="rgba(255,255,255,0.12)"/>
    <!-- Core drop -->
    <path d="M18 0 C25 12 18 22 18 22 C18 22 11 12 18 0Z" fill="url(#g2)" opacity="0.85"/>
  </g>

  <!-- Text -->
  <text x="640" y="380" text-anchor="middle"
        font-family="system-ui, -apple-system, sans-serif"
        font-size="72" font-weight="800" fill="#e0d4ff" letter-spacing="4">
    LOOT DROP
  </text>

  <text x="640" y="430" text-anchor="middle"
        font-family="system-ui, -apple-system, sans-serif"
        font-size="20" fill="#a78bfa" letter-spacing="6" font-weight="400">
    MARKET RESEARCH FROM 1,000 FAILED STARTUPS
  </text>

  <!-- Divider line -->
  <line x1="540" y1="458" x2="740" y2="458" stroke="#7c3aed" stroke-width="1" opacity="0.4"/>

  <!-- Tagline -->
  <text x="640" y="490" text-anchor="middle"
        font-family="system-ui, -apple-system, sans-serif"
        font-size="16" fill="#888" letter-spacing="2" font-weight="300">
    FIND THE GAP BEFORE YOU BUILD. VALIDATE BEFORE YOU COMMIT.
  </text>

  <!-- Bottom badge area -->
  <g transform="translate(640, 560)">
    <rect x="-120" y="-18" width="240" height="36" rx="18"
          fill="none" stroke="#7c3aed" stroke-width="1" opacity="0.3"/>
    <text x="0" y="6" text-anchor="middle"
          font-family="system-ui, -apple-system, sans-serif"
          font-size="12" fill="#7c3aed" letter-spacing="3" font-weight="500">
      CLI · AI SKILL · OPEN SOURCE
    </text>
  </g>

  <!-- Star particles -->
  <circle cx="120" cy="100" r="1.5" fill="#7c3aed" opacity="0.4"/>
  <circle cx="1100" cy="150" r="1" fill="#a78bfa" opacity="0.3"/>
  <circle cx="900" cy="80" r="1.5" fill="#6366f1" opacity="0.35"/>
  <circle cx="300" cy="500" r="1" fill="#2563eb" opacity="0.3"/>
  <circle cx="1050" cy="520" r="1.2" fill="#7c3aed" opacity="0.25"/>
</svg>
