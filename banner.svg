<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640" width="1280" height="640">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0c0a1d"/>
      <stop offset="50%" stop-color="#140b2e"/>
      <stop offset="100%" stop-color="#0a0a1a"/>
    </linearGradient>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#4f46e5"/>
    </linearGradient>
    <linearGradient id="g2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#ef4444"/>
    </linearGradient>
    <linearGradient id="tail" x1="100%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#7c3aed" stop-opacity="0"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0.5"/>
    </linearGradient>
  </defs>

  <rect width="1280" height="640" fill="url(#bg)"/>

  <!-- Subtle grid -->
  <g stroke="#7c3aed" stroke-width="0.3" opacity="0.05">
    <line x1="0" y1="160" x2="1280" y2="160"/>
    <line x1="0" y1="320" x2="1280" y2="320"/>
    <line x1="0" y1="480" x2="1280" y2="480"/>
    <line x1="320" y1="0" x2="320" y2="640"/>
    <line x1="640" y1="0" x2="640" y2="640"/>
    <line x1="960" y1="0" x2="960" y2="640"/>
  </g>

  <!-- Logo -->
  <g transform="translate(340 195) scale(1.8)">
    <path d="M-70 70 Q-30 40 8 22" stroke="url(#tail)" stroke-width="2" stroke-linecap="round" fill="none"/>
    <path d="M8 22 L16 8 L8 -6 L0 8 Z" fill="url(#g1)"/>
    <path d="M8 2 C14 12 8 20 8 20 C8 20 2 12 8 2Z" fill="url(#g2)" opacity="0.85"/>
  </g>

  <!-- Title -->
  <text x="640" y="380" text-anchor="middle"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif"
        font-size="64" font-weight="700" fill="#e4d9ff" letter-spacing="6">
    LOOT DROP
  </text>

  <text x="640" y="420" text-anchor="middle"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif"
        font-size="16" fill="#8b7cb8" letter-spacing="8" font-weight="400">
    MARKET RESEARCH FROM 1,000 FAILED STARTUPS
  </text>

  <!-- Divider -->
  <line x1="540" y1="445" x2="740" y2="445" stroke="#7c3aed" stroke-width="1" opacity="0.3"/>

  <!-- Tagline -->
  <text x="640" y="475" text-anchor="middle"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif"
        font-size="14" fill="#5a4a7a" letter-spacing="3" font-weight="300">
    FIND THE GAP BEFORE YOU BUILD. VALIDATE BEFORE YOU COMMIT.
  </text>

  <!-- Badge -->
  <g transform="translate(640 545)">
    <rect x="-110" y="-16" width="220" height="32" rx="16" fill="none" stroke="#7c3aed" stroke-width="0.5" opacity="0.3"/>
    <text x="0" y="5" text-anchor="middle"
          font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif"
          font-size="11" fill="#7c3aed" letter-spacing="4" font-weight="500">
      CLI · AI SKILL · OPEN SOURCE
    </text>
  </g>
</svg>
