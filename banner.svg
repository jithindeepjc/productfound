<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640" width="1280" height="640">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0c0a1d"/>
      <stop offset="40%" stop-color="#140b2e"/>
      <stop offset="100%" stop-color="#0a0a1a"/>
    </linearGradient>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="50%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#4f46e5"/>
    </linearGradient>
    <linearGradient id="g2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="50%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#ef4444"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7c3aed" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#6366f1" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <rect width="1280" height="640" fill="url(#bg)"/>

  <!-- Ambient glow -->
  <circle cx="320" cy="320" r="300" fill="url(#glow)"/>

  <!-- Subtle grid -->
  <g stroke="#7c3aed" stroke-width="0.3" opacity="0.04">
    <line x1="0" y1="160" x2="1280" y2="160"/>
    <line x1="0" y1="320" x2="1280" y2="320"/>
    <line x1="0" y1="480" x2="1280" y2="480"/>
    <line x1="320" y1="0" x2="320" y2="640"/>
    <line x1="640" y1="0" x2="640" y2="640"/>
    <line x1="960" y1="0" x2="960" y2="640"/>
  </g>

  <!-- Logo mark -->
  <g transform="translate(270 195) scale(1.8)">
    <circle cx="0" cy="0" r="85" stroke="#7c3aed" stroke-width="0.5" opacity="0.1" fill="none"/>
    <path d="M-40 -60 L-40 60 M-40 -60 L12 -60 C48 -60 60 -35 60 -5 C60 25 48 50 12 50 L-40 50"
          stroke="url(#g1)" stroke-width="11" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <g transform="translate(10 -5)">
      <path d="M0 -8 L2 -2 L8 -2 L3 1 L5 7 L0 3 L-5 7 L-3 1 L-8 -2 L-2 -2 Z" fill="url(#g2)"/>
    </g>
    <circle cx="45" cy="48" r="5" fill="url(#g2)"/>
    <path d="M22 30 Q40 32 43 43" stroke="url(#g2)" stroke-width="1.5" stroke-linecap="round" fill="none" opacity="0.25"/>
  </g>

  <!-- Wordmark -->
  <text x="600" y="310" text-anchor="middle"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif"
        font-size="58" font-weight="700" fill="#e4d9ff" letter-spacing="3">
    Productfound
  </text>

  <text x="600" y="355" text-anchor="middle"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif"
        font-size="16" fill="#8b7cb8" letter-spacing="8" font-weight="400">
    MARKET RESEARCH FROM 1,000 FAILED STARTUPS
  </text>

  <line x1="500" y1="380" x2="700" y2="380" stroke="#7c3aed" stroke-width="1" opacity="0.25"/>

  <text x="600" y="410" text-anchor="middle"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif"
        font-size="14" fill="#5a4a7a" letter-spacing="3" font-weight="300">
    FIND THE GAP BEFORE YOU BUILD. VALIDATE BEFORE YOU COMMIT.
  </text>

  <!-- Bottom badge -->
  <g transform="translate(600 485)">
    <rect x="-115" y="-16" width="230" height="32" rx="16" fill="none" stroke="#7c3aed" stroke-width="0.5" opacity="0.25"/>
    <text x="0" y="5" text-anchor="middle"
          font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif"
          font-size="11" fill="#7c3aed" letter-spacing="5" font-weight="500">
      CLI · AI SKILL · POSTMORTEMS
    </text>
  </g>

  <!-- Decorative dots -->
  <circle cx="100" cy="100" r="1.5" fill="#7c3aed" opacity="0.3"/>
  <circle cx="1150" cy="120" r="1" fill="#a78bfa" opacity="0.2"/>
  <circle cx="950" cy="520" r="1.2" fill="#6366f1" opacity="0.25"/>
  <circle cx="200" cy="500" r="1" fill="#f59e0b" opacity="0.15"/>
</svg>
