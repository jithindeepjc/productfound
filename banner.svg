<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640" width="1280" height="640">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0c0a1d"/>
      <stop offset="50%" stop-color="#140b2e"/>
      <stop offset="100%" stop-color="#0a0a1a"/>
    </linearGradient>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#4f46e5"/>
    </linearGradient>
    <linearGradient id="g2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#ef4444"/>
    </linearGradient>
  </defs>

  <rect width="1280" height="640" fill="url(#bg)"/>

  <!-- Subtle grid -->
  <g stroke="#7c3aed" stroke-width="0.3" opacity="0.05">
    <line x1="0" y1="160" x2="1280" y2="160"/>
    <line x1="0" y1="320" x2="1280" y2="320"/>
    <line x1="0" y1="480" x2="1280" y2="480"/>
    <line x1="320" y1="0" x2="320" y2="640"/>
    <line x1="640" y1="0" x2="640" y2="640"/>
    <line x1="960" y1="0" x2="960" y2="640"/>
  </g>

  <!-- Logo mark -->
  <g transform="translate(380 190) scale(1.6)">
    <circle cx="0" cy="0" r="90" stroke="url(#g1)" stroke-width="2" opacity="0.12" fill="none"/>
    <path d="M-30 -60 L-30 60 M-30 -60 L18 -60 C42 -60 50 -45 50 -30 C50 -15 42 0 18 0 L-30 0"
          stroke="url(#g1)" stroke-width="10" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <circle cx="40" cy="50" r="7" fill="url(#g2)"/>
    <path d="M18 10 Q48 20 40 50" stroke="url(#g2)" stroke-width="1.5" stroke-linecap="round" fill="none" opacity="0.3"/>
  </g>

  <!-- Wordmark -->
  <text x="650" y="365" text-anchor="middle"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif"
        font-size="56" font-weight="700" fill="#e4d9ff" letter-spacing="4">
    Productfound
  </text>

  <text x="650" y="405" text-anchor="middle"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif"
        font-size="15" fill="#8b7cb8" letter-spacing="7" font-weight="400">
    MARKET RESEARCH FROM 1,000 FAILED STARTUPS
  </text>

  <line x1="550" y1="430" x2="750" y2="430" stroke="#7c3aed" stroke-width="1" opacity="0.3"/>

  <text x="650" y="460" text-anchor="middle"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif"
        font-size="14" fill="#5a4a7a" letter-spacing="3" font-weight="300">
    FIND THE GAP BEFORE YOU BUILD. VALIDATE BEFORE YOU COMMIT.
  </text>

  <g transform="translate(650 530)">
    <rect x="-105" y="-15" width="210" height="30" rx="15" fill="none" stroke="#7c3aed" stroke-width="0.5" opacity="0.3"/>
    <text x="0" y="5" text-anchor="middle"
          font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif"
          font-size="11" fill="#7c3aed" letter-spacing="4" font-weight="500">
      CLI · AI SKILL · OPEN SOURCE
    </text>
  </g>
</svg>
