<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" fill="none">
  <defs>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#4f46e5"/>
    </linearGradient>
    <linearGradient id="g2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#ef4444"/>
    </linearGradient>
  </defs>

  <!-- Outer ring - the product space / market -->
  <circle cx="200" cy="200" r="150" stroke="url(#g1)" stroke-width="4" opacity="0.15" fill="none"/>

  <!-- P letterform - bold geometric -->
  <path d="M160 130 L160 270 M160 130 L220 130 C255 130 265 150 265 175 C265 200 255 220 220 220 L160 220"
        stroke="url(#g1)" stroke-width="18" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <!-- Discovery dot - the "found" element -->
  <circle cx="248" cy="262" r="12" fill="url(#g2)"/>

  <!-- Subtle arc suggesting orbit/discovery path -->
  <path d="M220 230 Q270 240 248 262"
        stroke="url(#g2)" stroke-width="2" stroke-linecap="round" fill="none" opacity="0.3"/>
</svg>
