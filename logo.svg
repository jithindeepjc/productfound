<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" fill="none">
  <defs>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="50%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#4f46e5"/>
    </linearGradient>
    <linearGradient id="g2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="50%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#ef4444"/>
    </linearGradient>
    <linearGradient id="g3" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7c3aed" stop-opacity="0"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0.08"/>
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="200" cy="200" r="180" fill="url(#g3)"/>

  <!-- Bold P letterform -->
  <path d="M140 100 L140 300 M140 100 L215 100 C260 100 275 130 275 170 C275 210 260 240 215 240 L140 240"
        stroke="url(#g1)" stroke-width="22" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <!-- Inner loop highlight -->
  <path d="M160 120 L205 120 C240 120 252 142 252 170 C252 198 240 220 205 220 L160 220"
        stroke="url(#g2)" stroke-width="3" stroke-linecap="round" fill="none" opacity="0.3"/>

  <!-- Discovery star in the P counter -->
  <g transform="translate(200 170)">
    <!-- 4-pointed star -->
    <path d="M0 -14 L3 -4 L14 -4 L5 2 L8 13 L0 6 L-8 13 L-5 2 L-14 -4 L-3 -4 Z"
          fill="url(#g2)"/>
  </g>

  <!-- Accent dot (the "found" marker) -->
  <circle cx="260" cy="280" r="10" fill="url(#g2)"/>

  <!-- Trailing arc suggesting discovery path -->
  <path d="M230 240 Q270 250 258 270"
        stroke="url(#g2)" stroke-width="2" stroke-linecap="round" fill="none" opacity="0.25"/>

  <!-- Subtle ring -->
  <circle cx="200" cy="200" r="155" stroke="url(#g1)" stroke-width="0.5" opacity="0.1" fill="none"/>
</svg>
